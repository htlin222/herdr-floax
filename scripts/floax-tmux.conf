# tmux config for the floax persistence layer (tmux -L herdr-floax).
#
# This tmux exists ONLY to keep the scratch shell alive across popup
# toggles — it should be invisible. Loaded with -f so the user's
# ~/.tmux.conf (status styling, keybindings) never leaks into the popup.

# Pass truecolor through. Without RGB the shell prompt's explicit
# background colors get approximated to the 256 palette and show up as
# off-color stripes against the terminal background inside the box.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# No inner chrome: the floax box already draws a title and key hint.
set -g status off

# Don't linger on prefix escapes; the popup shell should feel direct.
set -s escape-time 0
